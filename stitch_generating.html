<style>
        .loader-ring {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            box-shadow: 
                inset 0 0 20px rgba(175, 255, 209, 0.5),
                inset 10px 0 30px rgba(119, 153, 255, 0.4),
                inset -10px 0 30px rgba(0, 255, 170, 0.4);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loader-ring::before {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(0, 255, 170, 0.8),

                transparent 50%
            );
            mask: radial-gradient(transparent 68%, black 70%);
            -webkit-mask: radial-gradient(transparent 68%, black 70%);
        }
        
        .blur-overlay {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
